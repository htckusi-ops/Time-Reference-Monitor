# /etc/linuxptp/ptp4l.conf
# Time Reference Monitor – generated by setup.sh
#
# ptp4l is configured as a MONITORING-ONLY slave:
#
#   free_running 1   → ptp4l participates fully in the PTP protocol
#                      (Sync, Delay_Req, Announce messages) and calculates
#                      offsetFromMaster continuously, but does NOT discipline
#                      the system clock or the NIC hardware clock (PHC).
#
#   slaveOnly 1      → ptp4l never becomes a PTP master; pure receive/measure.
#
# The system clock is controlled exclusively by chrony (NTP).
# This guarantees that the NTP and PTP time displays in the monitor UI
# are metrologically independent measurements.
#
# ── Interface ────────────────────────────────────────────────────────────────
# The network interface is passed via '-i <iface>' on the command line
# (see /etc/systemd/system/ptp4l.service.d/time-reference-monitor.conf).
# The interface configured there must match --iface in time-reference-monitor.service.

[global]

# ── Core monitoring settings ─────────────────────────────────────────────────
free_running                1
slaveOnly                   1

# ── Message intervals (log2 seconds) ─────────────────────────────────────────
# 0  = 1/s  (default: every second)
logAnnounceInterval         1
logSyncInterval             0
logMinDelayReqInterval      0
announceReceiptTimeout      3

# ── Unix Domain Sockets ───────────────────────────────────────────────────────
# uds_address:    management socket (read/write, used by pmc -s /var/run/ptp4l)
# uds_ro_address: read-only socket  (used by this app: pmc -s /var/run/ptp4lro)
uds_address                 /var/run/ptp4l
uds_ro_address              /var/run/ptp4lro

# ── Transport ─────────────────────────────────────────────────────────────────
network_transport           UDPv4

# ── Timestamps ───────────────────────────────────────────────────────────────
# Use software timestamps if hardware timestamping is unavailable.
# Change to 'hardware' if your NIC supports PTP hardware timestamping.
time_stamping               software

# ── Clock identity (monitoring node) ─────────────────────────────────────────
clockClass                  255
clockAccuracy               0xFE
offsetScaledLogVariance     0xFFFF
timeSource                  0xA0
