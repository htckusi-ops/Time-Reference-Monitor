# /etc/asound.conf  –  ALSA system-wide configuration for Time-Reference-Monitor
#
# Purpose:
#   The LTC timecode input is a single hardware capture stream.  Two components
#   need to read it simultaneously:
#     1. alsaltc   – the LTC decoder (timecode → stdout)
#     2. ltc_level – the audio-level meter (RMS / peak for the UI)
#     3. spectrum  – optional on-demand spectrogram via arecord + sox
#
#   ALSA "dsnoop" multiplexes one capture device for N readers without a
#   sound daemon like PulseAudio or PipeWire.
#
# Hardware assumption:
#   The LTC audio interface appears as card "USB" (or hw:1,0 on most RPi setups).
#   Run `aplay -l` / `arecord -l` to find the correct card index and update below.
#
# After editing, test with:
#   arecord -D dsnoop_ltc -r 48000 -f S16_LE -c 1 -d 2 /tmp/test.wav

# ── Shared hardware capture ───────────────────────────────────────────────────
pcm.dsnoop_ltc {
    type     dsnoop
    ipc_key  1024           # unique key; change if you run multiple dsnoop devices
    ipc_perm 0660

    slave {
        # Adjust to match the LTC audio interface on the target hardware.
        # Examples:
        #   pcm "hw:1,0"          – by index (fast but fragile on reboot)
        #   pcm "hw:USB,0"        – by ALSA card name (stable)
        #   pcm "hw:CARD=USB,DEV=0"  – verbose form
        pcm      "hw:1,0"
        rate     48000
        channels 2          # capture both channels; alsaltc selects left (0)
        format   S16_LE
        # Buffer tuning for low-latency / stable capture on RPi:
        period_size  1024
        buffer_size  8192
    }
}

# Control interface for dsnoop_ltc (needed by some tools)
ctl.dsnoop_ltc {
    type hw
    card 1                  # match slave card index above
}

# ── Mono left-channel alias (used by ltc_level.py + arecord fallback) ────────
# config.py: LTC_ALSA_DEVICE = "ltc_left_mono"
pcm.ltc_left_mono {
    type  plug
    slave {
        pcm      dsnoop_ltc
        channels 1
    }
    route_policy copy        # copy left → mono
}
