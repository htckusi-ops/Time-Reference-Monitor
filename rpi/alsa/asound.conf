# /etc/asound.conf  –  ALSA system-wide configuration for Time-Reference-Monitor
#
# Purpose:
#   The LTC timecode input is a single hardware capture stream.  Two components
#   need to read it simultaneously:
#     1. alsaltc   – the LTC decoder (timecode → stdout)
#     2. ltc_level – the audio-level meter (RMS / peak for the UI)
#     3. spectrum  – optional on-demand spectrogram via arecord + sox
#
#   ALSA "dsnoop" multiplexes one capture device for N readers without a
#   sound daemon like PulseAudio or PipeWire.
#
# Hardware:
#   Tascam US-2x2HR USB audio interface
#   arecord -l shows: card 3: US2x2HR [US-2x2HR], device 0: USB Audio
#
#   Card numbers (hw:3,0) can change between reboots.  Use the stable card
#   NAME instead: hw:US2x2HR,0  (ALSA matches by the driver short-name).
#
# IMPORTANT: do not create ~/.asoundrc for the ptp user – it conflicts with
# this file (duplicate ltc_left_mono definition, different ipc_key → second
# dsnoop can't open the hardware → "Slave PCM not usable").
#
# Diagnostics:
#   arecord --dump-hw-params -D hw:US2x2HR,0 /dev/null 2>&1  # check FORMAT
#   arecord -D dsnoop_ltc -r 48000 -c 2 -d 2 /tmp/stereo.wav
#   arecord -D ltc_left_mono -r 48000 -f S16_LE -c 1 -d 2 /tmp/mono.wav

# ── Shared hardware capture ───────────────────────────────────────────────────
pcm.dsnoop_ltc {
    type     dsnoop
    ipc_key  1024
    ipc_perm 0660

    slave {
        pcm      "hw:US2x2HR,0"  # stable card name; survives USB re-enumeration
        rate     48000
        channels 2               # always capture both channels
        format   S32_LE          # Tascam US-2x2HR native: 24-bit in 32-bit words
        period_size  2048
        buffer_size  16384
    }
}

# Control interface (for amixer / aplay -l etc.)
ctl.dsnoop_ltc {
    type hw
    card "US2x2HR"
}

# ── Mono left-channel alias ───────────────────────────────────────────────────
# All consumers (alsaltc, ltc_level.py, spectrum) open THIS device.
# ttable routing: copy channel 0 (left = LTC) → mono output channel 0.
# The plug layer converts S32_LE stereo → S16_LE mono transparently.
#
# LTC timecode must be connected to the LEFT input (Input 1 of US-2x2HR).
# For right channel: change ttable.0.0 → ttable.0.1  (or swap the cable).
pcm.ltc_left_mono {
    type  plug
    slave.pcm "dsnoop_ltc"
    ttable.0.0 1.0              # left input (ch 0) → mono output (ch 0)
}
