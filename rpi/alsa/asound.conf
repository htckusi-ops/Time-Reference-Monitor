# /etc/asound.conf  –  ALSA system-wide configuration for Time-Reference-Monitor
#
# Purpose:
#   The LTC timecode input is a single hardware capture stream.  Two components
#   need to read it simultaneously:
#     1. alsaltc   – the LTC decoder (timecode → stdout)
#     2. ltc_level – the audio-level meter (RMS / peak for the UI)
#     3. spectrum  – optional on-demand spectrogram via arecord + sox
#
#   ALSA "dsnoop" multiplexes one capture device for N readers without a
#   sound daemon like PulseAudio or PipeWire.
#
# Hardware:
#   Tascam US-2x2HR USB audio interface
#   arecord -l shows: card 3: US2x2HR [US-2x2HR], device 0: USB Audio
#
#   Important: Card numbers (hw:3,0) can change between reboots when
#   other USB devices are added or removed.  Use the stable card NAME
#   instead: hw:US2x2HR,0  (ALSA matches by the driver short-name).
#
# Diagnosing format problems:
#   arecord --dump-hw-params -D hw:US2x2HR,0 /dev/null 2>&1
#   → look for the FORMAT line (e.g. S24_3LE or S32_LE)
#
# After editing, test with:
#   arecord -D dsnoop_ltc -r 48000 -c 2 -d 2 /tmp/test_stereo.wav
#   arecord -D ltc_left_mono -r 48000 -f S16_LE -c 1 -d 2 /tmp/test_mono.wav

# ── Shared hardware capture ───────────────────────────────────────────────────
pcm.dsnoop_ltc {
    type     dsnoop
    ipc_key  1024           # unique key; change if you run multiple dsnoop devices
    ipc_perm 0660

    slave {
        # Stable name-based reference – survives USB re-enumeration on reboot.
        # hw:US2x2HR,0  matches the short-name reported by arecord -l.
        #
        # If you use a different interface, set pcm to:
        #   pcm "hw:<ShortName>,0"   e.g. "hw:USB,0" or "hw:Focusrite,0"
        pcm      "hw:US2x2HR,0"

        rate     48000
        channels 2          # dsnoop must capture all hardware channels (stereo)

        # format: intentionally NOT set here.
        # ALSA auto-negotiates the native hardware format (S24_3LE or S32_LE
        # depending on driver version).  Hardcoding the wrong format causes
        # "Slave PCM not usable / no configurations available".
        # The plug device below converts to S16_LE for consumers (alsaltc etc.).

        # Buffer tuning for USB audio stability on RPi:
        period_size  2048
        buffer_size  16384
    }
}

# Control interface for dsnoop_ltc (needed by some tools, e.g. amixer)
ctl.dsnoop_ltc {
    type hw
    card "US2x2HR"          # quoted string – required by ALSA parser
}

# ── Mono left-channel alias ───────────────────────────────────────────────────
# All consumers (alsaltc, ltc_level.py, spectrum) open THIS device.
# The plug type handles:
#   1. Channel conversion: stereo (ch 0+1) → mono (ch 0, left = LTC signal)
#   2. Format conversion:  hardware native (S24_3LE/S32_LE) → S16_LE
#
# LTC timecode must be connected to the LEFT input (Input 1).
# To use the RIGHT channel instead: swap cable, or set route_policy to
# use ttable.0.1 1.0 mapping.
pcm.ltc_left_mono {
    type  plug
    slave {
        pcm      dsnoop_ltc
        channels 1
    }
    route_policy copy        # copy left (ch 0) → mono
}
