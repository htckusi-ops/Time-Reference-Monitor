# /etc/time-reference-monitor.conf
# Kiosk runtime configuration for Time-Reference-Monitor
#
# This file is sourced by kiosk.sh at X-session start.
# After changes, restart the kiosk:
#   sudo systemctl restart chromium-kiosk
#
# To update config.txt to match HDMI_MODE, run:
#   sudo bash /path/to/repo/rpi/update.sh

# ── HDMI output mode ─────────────────────────────────────────────────────────
# Controls the xrandr resolution and config.txt hdmi_mode setting.
#
#   sdi-1080i50  – 1920×1080 interlaced 50 Hz   (CEA-20, default)
#                  Standard broadcast HD format; use with HDMI→SDI converters.
#
#   sdi-1080p50  – 1920×1080 progressive 50 Hz  (CEA-31)
#                  Progressive HD; for converters requiring p-signal.
#
#   sdi-720p50   – 1280×720 progressive 50 Hz   (CEA-19)
#                  Lower-bandwidth HD; same pixel clock (74.25 MHz) as 1080i50.
#
#   auto         – Let the monitor choose its preferred resolution.
#                  Use this with PC monitors / when not driving an SDI converter.
#
HDMI_MODE=sdi-1080i50

# ── Seitenskalierung (Browser-Zoom) ──────────────────────────────────────────
# Steuert den Chromium device-scale-factor (CSS-Pixel zu physischen Pixel).
# Leer lassen = kein Flag gesetzt (Chromium-Standard = 1.0).
#
#   1.0   – 100 % (Standard für 1080p)
#   1.25  – 125 %
#   1.5   – 150 % (grössere Darstellung auf 1080p)
#   0.75  –  75 % (kleinere Darstellung, z.B. bei 720p zu viel Inhalt)
#
# Nach Änderung: sudo systemctl restart chromium-kiosk
# PAGE_ZOOM=1.0

# ── HDMI output port ──────────────────────────────────────────────────────────
# Expliziten xrandr-Output-Namen angeben, wenn Auto-Erkennung den falschen
# Port wählt (passiert wenn hdmi_force_hotplug=1 beide Ports als "connected"
# meldet und der falsche zuerst in der Prioritätsliste liegt).
#
# Wert aus 'DISPLAY=:0 xrandr --query' ablesen (nach dem Kiosk-Start via SSH).
#   RPi 4, Port 1 (näher USB-C): HDMI-1
#   RPi 4, Port 2:               HDMI-2
#   RPi 5:                       HDMI-A-1 / HDMI-A-2
#
# Leer lassen = Auto-Erkennung (erster "connected" in Prioritätsreihenfolge):
# HDMI_OUTPUT=HDMI-1

# ── Netzwerk-Interface für PTP ────────────────────────────────────────────────
# Wird von ptp4l.service und time-reference-monitor.service gelesen.
# Muss das Interface sein, das PTP-Pakete empfängt.
# Standard: eth0  (WLAN wird für PTP nicht unterstützt)
PTP_IFACE=eth0
