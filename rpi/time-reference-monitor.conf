# /etc/time-reference-monitor.conf
# Kiosk runtime configuration for Time-Reference-Monitor
#
# This file is sourced by kiosk.sh at X-session start.
# After changes, restart the kiosk:
#   sudo systemctl restart chromium-kiosk
#
# To update config.txt to match HDMI_MODE, run:
#   sudo bash /path/to/repo/rpi/update.sh

# ── HDMI output mode ─────────────────────────────────────────────────────────
# Controls the xrandr resolution and config.txt hdmi_mode setting.
#
#   sdi-1080i50  – 1920×1080 interlaced 50 Hz  (CEA mode 20, default)
#                  Standard broadcast format; use with HDMI→SDI converters.
#
#   sdi-1080p50  – 1920×1080 progressive 50 Hz (CEA mode 31)
#                  Progressive variant; for converters requiring p-signal.
#
#   auto         – Let the monitor choose its preferred resolution.
#                  Use this with PC monitors / when not driving an SDI converter.
#
HDMI_MODE=sdi-1080i50
