# /etc/chrony/chrony.conf
# Time Reference Monitor – generated by setup.sh
#
# chrony synchronises the system clock to NTP servers ONLY.
# ptp4l runs in free_running / monitor mode and does NOT discipline
# the system clock.  This keeps NTP and PTP as independent,
# metrologically separate reference displays in the monitor UI.
#
# To use different NTP servers, replace the pool lines below and
# re-run: sudo bash rpi/update.sh   (or: sudo systemctl restart chrony)

# ── NTP servers ───────────────────────────────────────────────────────────────
# Four independent pool.ntp.org servers for redundancy.
# 'iburst' allows faster initial synchronisation (several packets on first poll).
pool 0.pool.ntp.org iburst
pool 1.pool.ntp.org iburst
pool 2.pool.ntp.org iburst
pool 3.pool.ntp.org iburst

# ── Clock discipline ──────────────────────────────────────────────────────────
# Allow the first 3 updates to step the clock by any amount if off by > 1 s.
# After that, only slew adjustments are made (no sudden jumps).
makestep 1 3

# Persist frequency error estimate across reboots (avoids large initial slew).
driftfile /var/lib/chrony/drift

# Sync the on-board hardware RTC to the NTP-disciplined system clock.
rtcsync

# ── Access control ────────────────────────────────────────────────────────────
# Allow NTP client queries from localhost only (monitor uses chronyc, not NTP).
allow 127.0.0.1
allow ::1

# ── Logging ───────────────────────────────────────────────────────────────────
logdir /var/log/chrony
log tracking measurements statistics
